modLoader="javafml"
loaderVersion="[4,)"
license="MIT"

[[mods]]
modId="aeronauticscml"
version="${file.jarVersion}"
displayName="Aeronautics CML Bridge"
authors="Codey"
description='''
Bridges Sable's Physics Pipeline (SPP) ships / Create Aeronautics contraptions
into BBS CML Edition recordings so that BBS CML can capture ship movements
frame-by-frame.

LOADER NOTE: BBS CML is a Fabric mod. To run alongside SPP/Aeronautics on
NeoForge, install Sinytra Connector.
'''

[[mods.mixins]]
config = "aeronauticscml.mixins.json"

# Sable (SPP) - optional at runtime, mod still loads without it
[[dependencies.aeronauticscml]]
modId="sable"
type="optional"
ordering="AFTER"
side="BOTH"
mandatory=false

# Create Aeronautics - optional, provides ship wrappers on top of SPP
[[dependencies.aeronauticscml]]
modId="aeronautics_bundled"
type="optional"
ordering="AFTER"
side="BOTH"
mandatory=false

# BBS CML Edition
[[dependencies.aeronauticscml]]
modId="bbs"
type="optional"
ordering="AFTER"
side="BOTH"
mandatory=false

# NeoForge
[[dependencies.aeronauticscml]]
modId="neoforge"
type="required"
ordering="NONE"
side="BOTH"
mandatory=true

# Minecraft 1.21.1
[[dependencies.aeronauticscml]]
modId="minecraft"
type="required"
ordering="NONE"
side="BOTH"
mandatory=true
versionRange="[1.21.1,1.22)"
